name: Snapshot

# Snapshots odds every 4 hours = 6 runs/day. Off-tournament that is 2 credits/run
# (EPL + Superliga) ≈ 360/month; while the World Cup has fixtures it is 3
# credits/run, which still fits The Odds API's 500/month free tier for the ~3
# weeks it runs (SPEC §4). GitHub's scheduler can drift a few minutes, which is
# fine here. Widen the cron (e.g. every 6 hours) if credits run low.
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger snapshot endpoint
        env:
          SNAPSHOT_URL: ${{ vars.SNAPSHOT_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        # -f makes curl exit non-zero (red run) on any HTTP >= 400.
        run: |
          curl -fsS --retry 2 -X POST "$SNAPSHOT_URL" \
            -H "Authorization: Bearer $CRON_SECRET"
